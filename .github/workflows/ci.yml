name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  dotnet-build:
    name: .NET Restore/Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore iE.Api/iE.Api.sln

      - name: Build
        run: dotnet build iE.Api/iE.Api.sln --configuration Release --no-restore

  dotnet-tests-diagnostic:
    name: .NET Tests (diagnostic, non-blocking)
    runs-on: ubuntu-latest
    needs: dotnet-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore iE.Api/iE.Api.sln

      - name: Build
        run: dotnet build iE.Api/iE.Api.sln --configuration Release --no-restore

      - name: Test (detailed + TRX)
        # Temporary stabilization mode:
        # dotnet test remains enabled for diagnostics, but is non-blocking due to
        # known baseline B31.3 material lookup failures tracked in docs/testing/KNOWN_TEST_FAILURES.md.
        # This step must become blocking again after the focused B31.3 lookup correction PR lands.
        continue-on-error: true
        run: dotnet test iE.Api/iE.Api.sln --configuration Release --no-build --logger "console;verbosity=detailed" --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload .NET test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: TestResults
          if-no-files-found: warn

  frontend-build:
    name: Frontend Build (Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: iE.Web/package-lock.json

      - name: Install dependencies
        working-directory: iE.Web
        run: npm ci

      - name: Build frontend
        working-directory: iE.Web
        run: npm run build
